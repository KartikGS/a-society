<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">A-Society banner</title>
  <desc id="desc">A workflow-inspired banner with structured paths, role nodes, records, and feedback loops.</desc>
  <defs>
    <linearGradient id="banner-bg" x1="0" y1="0" x2="1600" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="0.48" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="teal-path" x1="210" y1="92" x2="1048" y2="206" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5EEAD4" stop-opacity="0"/>
      <stop offset="0.12" stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#5EEAD4"/>
    </linearGradient>
    <linearGradient id="amber-path" x1="212" y1="260" x2="1048" y2="260" gradientUnits="userSpaceOnUse">
