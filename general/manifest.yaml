# A-Society: Minimum Necessary Files Manifest
#
# Machine-readable source of truth for what a complete a-docs/ contains.
# Primary input to the Scaffolding System (Component 1, Phase 5).
#
# Fields per entry:
#   path        — file path relative to the project's a-docs/ root
#   description — what the artifact is and why it exists
#   required    — true: created in every initialization; false: conditional on explicit request
#   scaffold    — copy: Scaffolding System copies from source_path and fills in project name
#                 stub: Scaffolding System creates an empty titled file (agent fills content)
#   source_path — path within a-society/ to the template (copy) or instruction (stub) the
#                 Scaffolding System uses as the basis; relative to a-society/ root
#
# Maintainer: update this file when a new artifact type is added to general/instructions/ or
# when a general/ template is added or retired. The manifest and the instruction set must stay
# in sync. The manifest governs what the Scaffolding System creates; the instructions govern
# how agents fill the content. These are not the same thing and must not be merged.
#
# Variable: $GENERAL_MANIFEST
# Framework version introduced: v9.0

manifest_version: "1.0"

files:

