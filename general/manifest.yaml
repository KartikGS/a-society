  - path: agents.md
    description: "Agent orientation — minimal entry point for all agents working on this project; what the project is, the authority model, and project-wide invariants"
    required: true
    scaffold: stub
    source_path: general/instructions/agents.md

  - path: a-docs-guide.md
    description: "Why each file in this project's agent-docs exists — required reading for the Curator; prevents incorrect consolidation and documents rationale for every significant file"
    required: true
