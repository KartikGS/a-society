      role: Owner
    - id: curator-phase-1
      role: Curator
    - id: owner-phase-2
      role: Owner
    - id: curator-phase-3-findings
      role: Curator
    - id: owner-phase-3-findings
      role: Owner
    - id: curator-phase-3-synthesis
