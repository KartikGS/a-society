workflow:
  name: Record correction-loop continuation guidance
  summary: Add reusable guidance to $INSTRUCTION_RECORDS clarifying artifact sequencing after correction loops.
  nodes:
    - id: owner-intake
      role: Owner
    - id: curator-work
      role: Curator
    - id: owner-framework-decision
      role: Owner
    - id: curator-finalize
      role: Curator
    - id: owner-closure
      role: Owner
  edges:
    - from: owner-intake
      to: curator-work
      artifact: owner-to-curator
    - from: curator-work
      to: owner-framework-decision
      artifact: curator-to-owner
    - from: owner-framework-decision
      to: curator-finalize
      artifact: owner-to-curator
    - from: curator-finalize
      to: owner-closure
      artifact: curator-to-owner
