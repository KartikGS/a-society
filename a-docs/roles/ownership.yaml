# A-Society Surface Ownership Registry
#
# Maps every project surface to the role(s) accountable for its health.
# "Accountable" means: if this surface is broken, outdated, or missing,
# these roles are responsible for fixing it. The accountable role may
# delegate execution, but the health of the surface is their problem.
#
# Resolution rules:
# - More specific paths override less specific ones.
# - Every path in the project must resolve to at least one accountable role.
# - Unregistered paths are coverage gaps — validation should flag them.

surfaces:

  # ── Work Product: general/ ──
  - path: general/
    roles: [curator]
    scope: "Reusable library — instructions, templates, role archetypes, thinking frameworks"

  # ── Work Product: agents/ ──
  - path: agents/
    roles: [owner]
    scope: "Deployed external agents — Initializer and future outward-facing products"

  # ── Work Product: runtime/ ──
  - path: runtime/
    roles: [technical-architect, orchestration-developer, framework-services-developer]
    scope: "Executable layer — design authority (TA), orchestration (OD), framework services (FSD)"

  # ── Agent Documentation: a-docs/ ──
  - path: a-docs/agents.md
    roles: [owner]
    scope: "Agent orientation entry point"

  - path: a-docs/a-docs-design.md
    roles: [owner]
    scope: "a-docs design principles — owner-governed structural rules"

  - path: a-docs/a-docs-guide.md
    roles: [curator]
    scope: "Agent-docs guide — Curator-maintained operator reference"

  - path: a-docs/project-information/
    roles: [owner]
    scope: "Project identity — vision, structure, architecture, principles, log"

  - path: a-docs/roles/
    roles: [curator]
    scope: "Role definitions, required-readings authority, and ownership registry"

  - path: a-docs/indexes/
    roles: [curator]
    scope: "Internal file-path index"

  - path: a-docs/workflow/
    roles: [owner]
    scope: "Workflow definitions and routing rules"

  - path: a-docs/executable/
    roles: [technical-architect]
    scope: "Standing executable design references"

  - path: a-docs/improvement/
    roles: [curator]
    scope: "Improvement protocol and meta-analysis instructions"

  - path: a-docs/records/
    roles: [owner, curator, technical-architect, orchestration-developer, framework-services-developer]
    scope: "Record convention and flow artifact tracking — all roles contribute artifacts"

  - path: a-docs/communication/
    roles: [curator]
    scope: "Conversation templates and coordination protocols"

  - path: a-docs/updates/
    roles: [curator]
    scope: "Update report protocol and template"

  # ── Project Root ──
  - path: README.md
    roles: [owner]
    scope: "Project README — external presentation"

  - path: VERSION.md
    roles: [curator]
    scope: "Framework version stamp"

  - path: index.md
    roles: [curator]
    scope: "Public-facing index"

  - path: install.sh
    roles: [orchestration-developer]
    scope: "Installation script for operator CLI"

  # ── Feedback ──
  - path: feedback/
    roles: [curator]
    scope: "Inbound feedback signal from adopting projects"

  # ── Updates ──
  - path: updates/
    roles: [curator]
    scope: "Published framework update reports"
