role: owner
surfaces:
  - path: agents/
    scope: "A-Society outward-facing agent products"
  - path: a-docs/agents.md
    scope: "Agent orientation and entry-point truth"
  - path: a-docs/a-docs-design.md
    scope: "A-Society a-docs structural rules"
  - path: a-docs/project-information/
    scope: "Project direction, structure, principles, and lifecycle governance"
  - path: a-docs/project-information/architecture.md
    scope: "Framework architecture, feedback-signal architecture, and structural invariants"
  - path: a-docs/workflow/
    scope: "Workflow routing and gate policy"
  - path: a-docs/roles/owner/
    scope: "Owner role truth, support-doc truth, startup-context file, and ownership file"
  - path: a-docs/communication/coordination/
    scope: "Coordination and authority-policy truth"
  - path: a-docs/records/
    shared_with: [curator, technical-architect, orchestration-developer, framework-services-developer, ui-developer]
    scope: "Flow artifact contribution surface; each role is accountable for artifacts it produces"
  - path: .gitignore
    scope: "Repository ignore-policy surface"
  - path: LICENSE
    scope: "Repository license and distribution promise"
  - path: README.md
    scope: "External project framing and promise"
